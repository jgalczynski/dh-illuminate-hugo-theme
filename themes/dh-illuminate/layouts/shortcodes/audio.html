{{- $src := .Get "src" | default (.Get 0) -}} {{- $title := .Get "title" |
default "Audio" -}} {{- $type := .Get "type" | default "audio/mpeg" -}}
<div class="audio-embed" role="region" aria-label="{{ $title }}">
  <span class="audio-embed__label">🎧 Audio</span>
  <p class="audio-embed__title">{{ $title }}</p>
  <audio controls preload="metadata">
    <source src="{{ $src }}" type="{{ $type }}" />
    Your browser does not support the audio element.
    <a href="{{ $src }}">Download audio</a>
  </audio>
</div>
