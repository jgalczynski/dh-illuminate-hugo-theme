{{- $id := .Get "id" | default (.Get 0) -}} {{- $title := .Get "title" | default
"YouTube video" -}}
<div class="video-embed" role="region" aria-label="{{ $title }}">
  <iframe
    src="https://www.youtube-nocookie.com/embed/{{ $id }}?rel=0&modestbranding=1"
    title="{{ $title }}"
    allow="
      accelerometer;
      autoplay;
      clipboard-write;
      encrypted-media;
      gyroscope;
      picture-in-picture;
      web-share;
    "
    allowfullscreen
    loading="lazy"
  ></iframe>
</div>
