{{- $id := .Get "id" | default (.Get 0) -}} {{- $title := .Get "title" | default
"Vimeo video" -}}
<div class="video-embed" role="region" aria-label="{{ $title }}">
  <iframe
    src="https://player.vimeo.com/video/{{ $id }}?badge=0&autopause=0&player_id=0&app_id=58479"
    title="{{ $title }}"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen
    loading="lazy"
  ></iframe>
</div>
